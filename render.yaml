services:
  - type: web
    name: aplikasi-stok-kerabat
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: BETTER_AUTH_URL
        value: https://aplikasi-stok-kerabat.onrender.com
      - key: FRONTEND_URL
        value: https://paskalisagato.github.io
      - key: DATABASE_URL
        sync: false   # Isi manual di dashboard Render (sensitif)
      - key: BETTER_AUTH_SECRET
        sync: false   # Isi manual di dashboard Render (sensitif)

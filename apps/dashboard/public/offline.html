<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Kerabat Kopi Tiam</title>
    <style>
        :root {
            --bg-app: #0b1220;
            --primary: #c4b5fd;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 24px;
            box-sizing: border-box;
        }
        .container {
            max-width: 400px;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-box {
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, rgba(196, 181, 253, 0.1), rgba(196, 181, 253, 0.05));
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin-left: auto;
            margin-right: auto;
        }
        .icon {
            font-size: 48px;
            color: var(--primary);
        }
        h1 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            margin: 0 0 12px 0;
        }
        p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin: 0 0 40px 0;
            font-weight: 500;
        }
        button {
            background-color: var(--primary);
            color: #0b1220;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(196, 181, 253, 0.2);
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <div class="icon-box">
            <span class="material-symbols-outlined icon">signal_wifi_off</span>
        </div>
        <h1>Koneksi Terputus</h1>
        <p>Maaf, Kerabat membutuhkan koneksi internet untuk memproses transaksi Anda. Silakan periksa koneksi data atau Wi-Fi Anda.</p>
        <button onclick="window.location.reload()">Coba Lagi</button>
    </div>
</body>
</html>

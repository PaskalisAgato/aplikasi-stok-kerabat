      - name: Assemble dist-pages
        run: |
          mkdir -p dist-pages
          # Copy root redirector
          cp index.html dist-pages/index.html || true
          # Copy each app's build output into dist-pages
          for app in pos dashboard inventory recipes recipe-edit reports employees settings waste waste-detail opname hpp expenses cogs activity-history; do
            dir="apps/$app/dist"
            if [ -d "$dir" ]; then
              echo "Copying $dir -> dist-pages/$app"
              cp -r "$dir" "dist-pages/$app"
            else
              echo "Skipping $app (no dist folder)"
            fi
          done
          # Copy root redirect pages (fallback)
          cp dist-pages/index.html dist-pages/404.html 2>/dev/null || true
          ls -la dist-pages/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-pages
          publish_branch: gh-pages
          force_orphan: true
